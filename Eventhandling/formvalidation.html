<!DOCTYPE html>
<html>
<head>
    <title>Form Validation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e5e7eb;
            padding-top: 80px;
        }

        .container {
            width: 350px;
            margin: auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1d4ed8;
        }

        #msg {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Validation Using Pattern Matching</h2>

    <form onsubmit="return validateForm()">

        <label>Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label>Phone Number</label>
        <input type="text" id="phone" placeholder="Enter 10-digit number">

        <button type="submit">Submit</button>

    </form>

    <p id="msg"></p>
</div>

<script>
    function validateForm() {
        let name = document.getElementById("name").value;
        let phone = document.getElementById("phone").value;

        let namePattern = /^[A-Za-z ]+$/;
        let phonePattern = /^[6-9][0-9]{9}$/;

        if (!namePattern.test(name)) {
            document.getElementById("msg").innerText = "Invalid Name";
            document.getElementById("msg").style.color = "red";
            return false;
        }

        if (!phonePattern.test(phone)) {
            document.getElementById("msg").innerText = "Invalid Phone Number";
            document.getElementById("msg").style.color = "red";
            return false;
        }

        document.getElementById("msg").innerText = "Validation Successful";
        document.getElementById("msg").style.color = "green";
        return true;
    }
</script>

</body>
</html>
