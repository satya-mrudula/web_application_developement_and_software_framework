<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title> Event Handling </title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    #box {
      width: 200px;
      height: 200px;
      background-color: #4f46e5;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 20px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
  </style>
</head>

<body>

  <h2>JavaScript Event Demo</h2>

  <!-- onclick -->
  <button id="btn">Click Me</button>

  <!-- onmouseover, onmouseout, onmousemove -->
  <div id="box">Hover Me</div>

  <!-- onerror -->
  <img id="img" src="wrong_image.png" alt="Broken image" width="200">

  <script>
    // onload
    window.addEventListener("load", function () {
      console.log("Page fully loaded");

      // onclick
      document.getElementById("btn").addEventListener("click", function () {
        alert("swwwaaahhhllllaaaalllaaa!!!!!");
      });

      // onmouseover
      const box = document.getElementById("box");

      box.addEventListener("mouseover", function () {
        box.style.backgroundColor = "#22c55e";
        box.textContent = "Mouse Over";
      });

      // onmouseout
      box.addEventListener("mouseout", function () {
        box.style.backgroundColor = "#4f46e5";
        box.textContent = "Hover Me";
      });

      // onmousemove
      box.addEventListener("mousemove", function () {
        console.log("Mouse moving inside the box");
      });

      // onerror
      document.getElementById("img").addEventListener("error", function () {
        console.log("Image failed to load");
      });
    });
  </script>

</body>
</html>
