<!DOCTYPE html>
<html>
<head>
    <title>Form Validation</title>
</head>
<body>
    <h2>Enter details please!!!</h2>
    <form onsubmit="return validateForm()">
        Name:
        <input type="text" id="name"><br><br>
        Phone Number:
        <input type="text" id="phone"><br><br>
        Email:
        <input type="text" id="email"><br><br>
        Password:
        <input type="password" id="password"><br><br>
        <input type="submit" value="Submit">
    </form>
    <p id="msg"></p>
    <script>
        function validateForm() {
            let name = document.getElementById("name").value;
            let phone = document.getElementById("phone").value;
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;
            let namePattern = /^[A-Za-z ]+$/;
            let phonePattern = /^[6-9][0-9]{9}$/;
            let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            let passwordPattern = /^.{6,}$/;
            if (!namePattern.test(name)) {
                document.getElementById("msg").innerText = "Invalid Name";
                return false;
            }
            if (!phonePattern.test(phone)) {
                document.getElementById("msg").innerText = "Invalid Phone Number";
                return false;
            }
            if (!emailPattern.test(email)) {
                document.getElementById("msg").innerText = "Invalid Email";
                return false;
            }
            if (!passwordPattern.test(password)) {
                document.getElementById("msg").innerText = "Password must be at least 6 characters";
                return false;
            }
            document.getElementById("msg").innerText = "Validation Successful";
            return false;
        }
    </script>
</body>
</html>
