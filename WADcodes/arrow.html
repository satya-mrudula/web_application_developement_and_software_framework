<!DOCTYPE html>
<html>
<head>
    <title>Arrow Function Example</title>
</head>
<body>
    <h2>Arrow Function in JavaScript</h2>
    <p id="output"></p>

    <script>
        // Arrow Function
        const add = (a, b) => a + b;

        // Function Call
        let result = add(4, 6);

        // Display Output
        document.getElementById("output").innerText =
            "Sum is: " + result;
    </script>
</body>
</html>
