<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Handling</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      padding: 40px;
      background: #f9fafb;
    }

    h2 {
      margin-bottom: 10px;
    }

    #status {
      margin-top: 10px;
      font-weight: 500;
      color: #374151;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #111827;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #1f2937;
    }

    #box {
      width: 220px;
      height: 220px;
      background-color: #4f46e5;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 30px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      user-select: none;
    }

    img {
      margin-top: 30px;
      width: 200px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h2>Welcome</h2>
  <p id="status">Waiting for interaction…</p>
  <button id="btn">hit Me</button>
  <div id="box">Move your mouse</div>
  <img id="img" src="wrong_image.png" alt="Image...">
  <script>
    window.addEventListener("load", () => {
      setStatus("Page loaded successfully ✔️");
      const button = document.getElementById("btn");
      const box = document.getElementById("box");
      const image = document.getElementById("img");
      button.addEventListener("click", () => {
        setStatus("Swalllaaahhhaaa!!!!!");
        button.textContent = "oh my god you hit me!";
      });
      box.addEventListener("mouseover", () => {
        box.style.backgroundColor = "#22c55e";
        box.textContent = "Mouse Over ";
        setStatus("Mouse entered the box");
      });
      box.addEventListener("mouseout", () => {
        box.style.backgroundColor = "#4f46e5";
        box.textContent = "Move your mouse";
        setStatus("Mouse left the box");
      });
      box.addEventListener("mousemove", () => {
        setStatus("Mouse moving inside the box");
      });
      image.addEventListener("error", () => {
        setStatus("Image failed to load");
        image.alt = "Image not found";
      });
    });
    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }
  </script>
</body>
</html>
