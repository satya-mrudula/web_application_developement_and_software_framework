<!DOCTYPE html>
<html>
<head>
    <title>Array Methods</title>
</head>
<body>
    <h2>JavaScript Array Methods Demo</h2>
    <pre id="output"></pre>

    <script>
        let arr1 = [10, 30, 20, 40];
        let arr2 = [50, 60];
        let text = "";
        text += "join(): " + arr1.join(", ") + "\n";
        text += "reverse(): " + arr1.reverse() + "\n";
        arr1.sort();
        text += "sort(): " + arr1 + "\n";
        let arr3 = arr1.concat(arr2);
        text += "concat(): " + arr3 + "\n";
        text += "slice(1, 3): " + arr3.slice(1, 3) + "\n";
        arr1.push(70);
        text += "push(70): " + arr1 + "\n";
        arr1.pop();
        text += "pop(): " + arr1 + "\n";
        document.getElementById("output").innerText = text;
    </script>
</body>
</html>
