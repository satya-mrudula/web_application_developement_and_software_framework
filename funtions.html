<!DOCTYPE html>
<html>
<body>

<h3>Functions in JavaScript</h3>

<input type="number" id="a" placeholder="Enter first number">
<input type="number" id="b" placeholder="Enter second number">
<button onclick="calculate()">Calculate</button>

<p id="result"></p>

<script>
function add(x, y) {
    return x + y;
}

function calculate() {
    let n1 = parseInt(document.getElementById("a").value);
    let n2 = parseInt(document.getElementById("b").value);

    let sum = add(n1, n2);

    document.getElementById("result").innerHTML =
        "Sum = " + sum;
}
</script>

</body>
</html>
