<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TimeVerse Form Validation</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background:#f3e8dc;
    color:#3e3a34;
}

.container{
    max-width:800px;
    margin:auto;
    padding:50px 25px;
}

h1{
    font-size:36px;
    font-weight:600;
    color:#5a4a3c;
    margin-bottom:8px;
}

.subtitle{
    color:#7b6a5c;
    margin-bottom:30px;
}

.form-box{
    background:#fbf5ee;
    border-radius:14px;
    padding:30px;
    border:1px solid #e2d3c3;
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:6px;
    font-weight:600;
    color:#5a4a3c;
}

input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #d2bba3;
    font-size:14px;
}

button{
    margin-top:22px;
    padding:12px 26px;
    background:#e6d2be;
    border:1px solid #d2bba3;
    border-radius:22px;
    font-size:15px;
    cursor:pointer;
    color:#3e342b;
}

button:hover{
    background:#dcc5ae;
}

.error{
    color:#b54a3a;
    font-size:13px;
    margin-top:4px;
}

.success{
    margin-top:20px;
    color:#2f7a4f;
    font-weight:600;
}
</style>
</head>

<body>

<div class="container">

<h1>TimeVerse</h1>
<p class="subtitle">JavaScript Input Validation System</p>

<div class="form-box">

<form onsubmit="return validateForm()">

<label>Full Name</label>
<input type="text" id="name">
<div class="error" id="nameError"></div>

<label>Email Address</label>
<input type="text" id="email">
<div class="error" id="emailError"></div>

<label>Mobile Number</label>
<input type="text" id="mobile">
<div class="error" id="mobileError"></div>

<label>Password</label>
<input type="password" id="password">
<div class="error" id="passwordError"></div>

<label>Confirm Password</label>
<input type="password" id="confirmPassword">
<div class="error" id="confirmPasswordError"></div>

<button type="submit">Submit</button>

<div class="success" id="successMsg"></div>

</form>

</div>

</div>

<script>
function validateForm(){

    // Get values
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let mobile = document.getElementById("mobile").value.trim();
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    // Error fields
    let nameError = document.getElementById("nameError");
    let emailError = document.getElementById("emailError");
    let mobileError = document.getElementById("mobileError");
    let passwordError = document.getElementById("passwordError");
    let confirmPasswordError = document.getElementById("confirmPasswordError");
    let successMsg = document.getElementById("successMsg");

    // Reset
    nameError.innerText = "";
    emailError.innerText = "";
    mobileError.innerText = "";
    passwordError.innerText = "";
    confirmPasswordError.innerText = "";
    successMsg.innerText = "";

    let valid = true;

    // Name validation
    if(name === ""){
        nameError.innerText = "Name cannot be empty";
        valid = false;
    }

    // Email validation
    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(email === ""){
        emailError.innerText = "Email cannot be empty";
        valid = false;
    }
    else if(!emailPattern.test(email)){
        emailError.innerText = "Invalid email format";
        valid = false;
    }

    // Mobile validation
    let mobilePattern = /^[0-9]{10}$/;
    if(mobile === ""){
        mobileError.innerText = "Mobile number required";
        valid = false;
    }
    else if(!mobilePattern.test(mobile)){
        mobileError.innerText = "Mobile must be 10 digits";
        valid = false;
    }

    // Password validation
    if(password === ""){
        passwordError.innerText = "Password cannot be empty";
        valid = false;
    }
    else if(password.length < 6){
        passwordError.innerText = "Password must be at least 6 characters";
        valid = false;
    }

    // Confirm password
    if(confirmPassword === ""){
        confirmPasswordError.innerText = "Confirm your password";
        valid = false;
    }
    else if(password !== confirmPassword){
        confirmPasswordError.innerText = "Passwords do not match";
        valid = false;
    }

    // Success
    if(valid){
        successMsg.innerText = "Form submitted successfully ✔";
    }

    return false; // prevent real submit for demo
}
</script>

</body>
</html>
